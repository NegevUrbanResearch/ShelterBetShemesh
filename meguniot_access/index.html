<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shelter-bet-shemesh</title>
    <link rel="icon" type="image/svg+xml" href="./assets/nur-favicon.svg" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="map"></div>

      <header class="topbar">
        <div class="brand">
          <img src="./assets/nur-favicon.svg" alt="NUR" class="nur-logo" />
          <div>
            <h1>Access to Shelter - Beit Shemesh</h1>
            <p>עיר מקלט - בית שמש</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="openGuideBtn" class="btn btn-ghost btn-icon-circle" aria-label="Info">i</button>
        </div>
      </header>

      <aside class="control-card glass">
        <label for="bucketSelect">Time bucket</label>
        <select id="bucketSelect"></select>

        <label for="countRange">Recommended shelters</label>
        <input id="countRange" type="range" min="0" max="0" value="0" />
        <div id="countValue" class="count-badge">0</div>

        <div class="downloads">
          <button id="downloadCsv" class="btn">Download CSV</button>
          <button id="downloadGeojson" class="btn">Download GeoJSON</button>
        </div>

        <section id="stats" class="stats"></section>
      </aside>

      <aside id="mapLegend" class="legend-card glass">
        <h2 class="legend-title">Map legend</h2>
        <div class="legend-items">
          <div class="legend-row">
            <img src="./assets/existing.svg" alt="" class="legend-marker" />
            <span>Existing shelters (meguniot + miklatim)</span>
          </div>
          <div class="legend-row">
            <img src="./assets/proposed.svg" alt="" class="legend-marker legend-marker-small" />
            <span>Recommended shelters</span>
          </div>
          <div class="legend-row">
            <span class="legend-swatch legend-swatch-uncovered"></span>
            <span>Uncovered buildings (existing conditions)</span>
          </div>
          <div class="legend-row">
            <span class="legend-swatch legend-swatch-covered-base"></span>
            <span>Covered buildings (existing conditions)</span>
          </div>
          <div class="legend-row">
            <span class="legend-dot legend-dot-covered"></span>
            <span>Covered by selected shelter</span>
          </div>
        </div>
        <details class="legend-layers" open>
          <summary>Layers</summary>
          <label><input type="checkbox" id="layerMeguniot" checked /> Existing meguniot</label>
          <label><input type="checkbox" id="layerMiklatim" checked /> Existing miklatim</label>
          <label><input type="checkbox" id="layerRecommended" checked /> Recommended meguniot</label>
          <label><input type="checkbox" id="layerUncoveredBuildings" checked /> Uncovered buildings</label>
          <label><input type="checkbox" id="layerCoveredBuildingsBase" checked /> Covered buildings</label>
          <label><input type="checkbox" id="layerCovered" checked /> Covered by selected shelter</label>
        </details>
      </aside>

      <div id="guideModal" class="modal hidden">
        <div class="modal-card guide-card glass">
          <div class="modal-head guide-head">
            <div class="guide-head-row">
              <h2 id="guideTitle">Access to Shelter - Beit Shemesh</h2>
              <button id="closeGuideBtn" class="btn btn-close" aria-label="Close help">✕</button>
            </div>
            <div class="guide-toolbar">
              <div class="guide-tabs" role="tablist" aria-label="Guide sections">
                <button id="guideTabUsage" class="btn btn-ghost active-tab" role="tab">Usage</button>
                <button id="guideTabMethods" class="btn btn-ghost" role="tab">Methods</button>
              </div>
              <div id="langSwitchWrap" class="lang-switch-wrap">
                <span id="langLabelEn">EN</span>
                <label class="lang-toggle">
                  <input id="languageToggle" type="checkbox" />
                  <span class="lang-toggle-slider"></span>
                </label>
                <span id="langLabelHe">עברית</span>
              </div>
            </div>
          </div>
          <div id="guideContent" class="modal-body"></div>
        </div>
      </div>
    </div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/proj4@2.19.10/dist/proj4.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
